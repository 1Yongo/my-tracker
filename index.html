<script>
    // Хранилище целей
    let goals = [];
    
    // ID для таймеров
    let timerIntervals = {};

    // Загрузка данных из localStorage
    function loadData() {
        const savedGoals = localStorage.getItem('productivityGoals');
        if (savedGoals) {
            try {
                goals = JSON.parse(savedGoals);
                // Восстанавливаем состояние таймеров (все таймеры должны быть остановлены при загрузке)
                goals.forEach(goal => {
                    if (goal.timerRunning) {
                        goal.timerRunning = false;
                    }
                });
            } catch (e) {
                console.error('Ошибка загрузки данных:', e);
                goals = [];
            }
        } else {
            // Цели по умолчанию, если ничего нет
            goals = [
                {
                    id: generateId(),
                    title: 'Изучить Python',
                    goalHours: 500,
                    currentHours: 0,
                    timerSeconds: 0,
                    timerRunning: false
                },
                {
                    id: generateId(),
                    title: 'Чтение книг',
                    goalHours: 100,
                    currentHours: 0,
                    timerSeconds: 0,
                    timerRunning: false
                }
            ];
        }
        
        renderGoals();
    }

    // Сохранение в localStorage
    function saveData() {
        localStorage.setItem('productivityGoals', JSON.stringify(goals));
    }

    // Генерация уникального ID
    function generateId() {
        return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    }

    // Форматирование времени
    function formatTime(seconds) {
        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;
        return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    // Добавление новой цели
    function addNewGoal() {
        const titleInput = document.getElementById('newGoalTitle');
        const hoursInput = document.getElementById('newGoalHours');
        
        const title = titleInput.value.trim();
        const goalHours = parseInt(hoursInput.value);
        
        if (!title) {
            alert('Введите название цели');
            return;
        }
        
        if (!goalHours || goalHours <= 0) {
            alert('Введите корректное количество часов');
            return;
        }
        
        const newGoal = {
            id: generateId(),
            title: title,
            goalHours: goalHours,
            currentHours: 0,
            timerSeconds: 0,
            timerRunning: false
        };
        
        goals.push(newGoal);
        saveData();
        renderGoals();
        
        // Очищаем поля
        titleInput.value = '';
        hoursInput.value = '100';
    }

    // Удаление цели
    function deleteGoal(goalId) {
        if (confirm('Вы уверены, что хотите удалить эту цель?')) {
            // Останавливаем таймер если он запущен
            if (timerIntervals[goalId]) {
                clearInterval(timerIntervals[goalId]);
                delete timerIntervals[goalId];
            }
            
            goals = goals.filter(g => g.id !== goalId);
            saveData();
            renderGoals();
        }
    }

    // Редактирование цели
    function editGoal(goalId) {
        const goal = goals.find(g => g.id === goalId);
        if (!goal) return;
        
        // Создаем форму редактирования
        const card = document.querySelector(`[data-goal-id="${goalId}"]`);
        const content = card.querySelector('.goal-content');
        
        const editHtml = `
            <div class="edit-mode">
                <input type="text" id="editTitle-${goalId}" value="${goal.title}" maxlength="50">
                <input type="number" id="editHours-${goalId}" value="${goal.goalHours}" min="1" step="1">
                <div class="edit-actions">
                    <button class="save-btn" onclick="saveEdit('${goalId}')">Сохранить</button>
                    <button class="cancel-btn" onclick="renderGoals()">Отмена</button>
                </div>
            </div>
        `;
        
        content.innerHTML = editHtml;
    }

    // Сохранение редактирования
    function saveEdit(goalId) {
        const goal = goals.find(g => g.id === goalId);
        if (!goal) return;
        
        const newTitle = document.getElementById(`editTitle-${goalId}`).value.trim();
        const newHours = parseInt(document.getElementById(`editHours-${goalId}`).value);
        
        if (!newTitle) {
            alert('Введите название цели');
            return;
        }
        
        if (!newHours || newHours <= 0) {
            alert('Введите корректное количество часов');
            return;
        }
        
        goal.title = newTitle;
        goal.goalHours = newHours;
        
        saveData();
        renderGoals();
    }

    // Запуск таймера
    function startTimer(goalId) {
        const goal = goals.find(g => g.id === goalId);
        if (!goal) return;
        
        // Если таймер уже запущен для этой цели, ничего не делаем
        if (goal.timerRunning) {
            return;
        }
        
        // Останавливаем все другие запущенные таймеры (опционально, чтобы не было конфликтов)
        goals.forEach(g => {
            if (g.timerRunning && g.id !== goalId) {
                stopTimer(g.id);
            }
        });
        
        goal.timerRunning = true;
        
        // Очищаем предыдущий интервал если был
        if (timerIntervals[goalId]) {
            clearInterval(timerIntervals[goalId]);
        }
        
        timerIntervals[goalId] = setInterval(() => {
            goal.timerSeconds++;
            updateTimerDisplay(goalId);
            // Сохраняем каждую секунду, чтобы при обновлении страницы таймер не сбрасывался
            saveData();
        }, 1000);
        
        saveData();
        renderGoals(); // Перерисовываем для обновления состояния кнопок
    }

    // Остановка таймера
    function stopTimer(goalId) {
        console.log('Останавливаем таймер для цели:', goalId); // Для отладки
        
        const goal = goals.find(g => g.id === goalId);
        if (!goal) {
            console.error('Цель не найдена:', goalId);
            return;
        }
        
        // Останавливаем интервал
        if (timerIntervals[goalId]) {
            clearInterval(timerIntervals[goalId]);
            delete timerIntervals[goalId];
            console.log('Интервал очищен');
        }
        
        // Обновляем статус таймера
        goal.timerRunning = false;
        
        // Добавляем время к прогрессу
        if (goal.timerSeconds > 0) {
            const hoursToAdd = goal.timerSeconds / 3600;
            goal.currentHours = parseFloat((goal.currentHours + hoursToAdd).toFixed(2));
            console.log(`Добавлено ${hoursToAdd.toFixed(2)} часов. Новый прогресс: ${goal.currentHours}`);
            goal.timerSeconds = 0;
        }
        
        // Обновляем отображение таймера
        updateTimerDisplay(goalId);
        
        // Сохраняем данные
        saveData();
        
        // Перерисовываем для обновления состояния кнопок
        renderGoals();
    }

    // Сброс таймера
    function resetTimer(goalId) {
        const goal = goals.find(g => g.id === goalId);
        if (!goal) return;
        
        if (goal.timerRunning) {
            clearInterval(timerIntervals[goalId]);
            delete timerIntervals[goalId];
            goal.timerRunning = false;
        }
        
        goal.timerSeconds = 0;
        updateTimerDisplay(goalId);
        saveData();
        renderGoals(); // Перерисовываем для обновления состояния кнопок
    }

    // Обновление отображения таймера
    function updateTimerDisplay(goalId) {
        const goal = goals.find(g => g.id === goalId);
        if (!goal) return;
        
        const timerElement = document.getElementById(`timer-${goalId}`);
        if (timerElement) {
            timerElement.textContent = formatTime(goal.timerSeconds);
        }
    }

    // Ручное добавление времени
    function addManualTime(goalId) {
        const goal = goals.find(g => g.id === goalId);
        if (!goal) return;
        
        const input = document.getElementById(`manual-${goalId}`);
        const hours = parseFloat(input.value);
        
        if (hours && hours > 0) {
            goal.currentHours = parseFloat((goal.currentHours + hours).toFixed(2));
            input.value = '0';
            saveData();
            renderGoals();
        } else {
            alert('Введите положительное число часов');
        }
    }

    // Отрисовка всех целей
    function renderGoals() {
        const grid = document.getElementById('goalsGrid');
        
        if (goals.length === 0) {
            grid.innerHTML = '<div class="empty-state">✨ Добавьте свою первую цель!</div>';
            return;
        }
        
        let html = '';
        goals.forEach(goal => {
            const percentage = Math.min(100, (goal.currentHours / goal.goalHours)
